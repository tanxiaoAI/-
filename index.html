<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能户型优化系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .drag-active {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
        }
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 自定义网格布局的卡片悬浮效果 */
        .image-card:hover .download-overlay {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="fa-solid fa-house-chimney-window"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-900">AI 智能户型优化</h1>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- 上传卡片区域 -->
        <section id="upload-section" class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden transition-all duration-500">
            <div class="p-8 sm:p-10">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">上传原始户型图</h2>
                    <p class="text-gray-500">支持 JPG, PNG 格式，AI 将自动为您生成 4 种优化后的平面设计方案</p>
                </div>

                <!-- 拖拽/点击上传区 -->
                <div id="drop-zone" class="relative border-2 border-dashed border-gray-300 rounded-xl p-10 flex flex-col items-center justify-center cursor-pointer hover:border-blue-500 hover:bg-gray-50 transition-all duration-300 min-h-[280px]">
                    <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/png, image/jpeg, image/jpg">
                    
                    <!-- 默认状态 -->
                    <div id="upload-prompt" class="flex flex-col items-center pointer-events-none">
                        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mb-4">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl text-blue-500"></i>
                        </div>
                        <p class="text-lg font-medium text-gray-700 mb-1">点击或拖拽图片至此</p>
                        <p class="text-sm text-gray-400">最大支持 10MB</p>
                    </div>

                    <!-- 图片预览状态 -->
                    <div id="preview-container" class="hidden w-full h-full flex flex-col items-center justify-center absolute inset-0 bg-white z-10 p-4 rounded-xl">
                        <img id="image-preview" class="max-h-full max-w-full object-contain rounded shadow-sm mb-4" src="" alt="预览图">
                        <div class="absolute top-4 right-4 flex space-x-2">
                            <button type="button" id="remove-btn" class="bg-red-500 hover:bg-red-600 text-white rounded-full w-8 h-8 flex items-center justify-center shadow-md transition-colors z-20" title="移除图片">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <div class="mt-8 flex justify-center">
                    <button id="submit-btn" disabled class="px-8 py-3.5 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white text-lg font-medium rounded-xl shadow-md transition-all duration-300 flex items-center space-x-2">
                        <span>开始生成优化方案</span>
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Loading 状态区域 (默认隐藏) -->
        <section id="loading-section" class="hidden max-w-3xl mx-auto mt-12 text-center">
            <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center">
                <div class="relative w-24 h-24 mb-6">
                    <div class="absolute inset-0 border-4 border-gray-200 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent loader"></div>
                    <div class="absolute inset-0 flex items-center justify-center text-blue-600">
                        <i class="fa-solid fa-robot text-2xl"></i>
                    </div>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">AI 正在进行深度计算...</h3>
                <p class="text-gray-500 mb-6">家装设计生成预计需要 <span class="font-bold text-blue-600">约 40 秒</span>，请耐心等待</p>
                
                <!-- 进度条模拟 -->
                <div class="w-full max-w-md bg-gray-200 rounded-full h-2.5 mb-2 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%; transition: width 0.5s linear;"></div>
                </div>
                <p id="progress-text" class="text-sm text-gray-400">0%</p>
            </div>
        </section>

        <!-- 结果展示区域 (默认隐藏) -->
        <section id="result-section" class="hidden mt-12">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900">为您生成的优化方案</h2>
                    <p class="text-gray-500 mt-1">点击图片右上角的按钮即可下载高清大图</p>
                </div>
                <button id="reset-btn" class="px-4 py-2 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg font-medium transition-colors flex items-center space-x-2">
                    <i class="fa-solid fa-rotate-left"></i>
                    <span>重新上传</span>
                </button>
            </div>

            <!-- 响应式网格布局: 移动端1列, 平板2列, PC端2列 -->
            <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
                <!-- 结果卡片将通过 JS 动态插入 -->
            </div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM 元素获取
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            const uploadPrompt = document.getElementById('upload-prompt');
            const previewContainer = document.getElementById('preview-container');
            const imagePreview = document.getElementById('image-preview');
            const removeBtn = document.getElementById('remove-btn');
            const submitBtn = document.getElementById('submit-btn');
            
            const uploadSection = document.getElementById('upload-section');
            const loadingSection = document.getElementById('loading-section');
            const resultSection = document.getElementById('result-section');
            
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const gridContainer = document.getElementById('grid-container');
            const resetBtn = document.getElementById('reset-btn');

            let currentFile = null;
            let progressInterval = null;

            // --- 文件选择与拖拽处理 ---
            
            // 点击上传区触发 input
            dropZone.addEventListener('click', (e) => {
                if(e.target !== removeBtn && e.target.closest('#remove-btn') === null) {
                    fileInput.click();
                }
            });

            // 阻止默认拖拽行为
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            // 拖拽高亮
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-active'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-active'), false);
            });

            // 处理文件放置
            dropZone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            });

            // 处理 input 选择文件
            fileInput.addEventListener('change', function() {
                handleFiles(this.files);
            });

            function handleFiles(files) {
                if (files.length === 0) return;
                const file = files[0];
                
                // 验证文件类型
                if (!file.type.match('image.*')) {
                    alert('请上传图片文件 (JPG/PNG)！');
                    return;
                }
                
                // 验证大小 (10MB)
                if (file.size > 10 * 1024 * 1024) {
                    alert('图片大小不能超过 10MB！');
                    return;
                }

                currentFile = file;
                
                // 预览图片
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    uploadPrompt.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                    submitBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }

            // 移除已选图片
            removeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                resetUploadArea();
            });

            function resetUploadArea() {
                currentFile = null;
                fileInput.value = '';
                imagePreview.src = '';
                previewContainer.classList.add('hidden');
                uploadPrompt.classList.remove('hidden');
                submitBtn.disabled = true;
            }

            // --- 提交与 API 请求处理 ---
            
            submitBtn.addEventListener('click', async () => {
                if (!currentFile) return;

                // 切换到 Loading 状态
                uploadSection.classList.add('hidden');
                loadingSection.classList.remove('hidden');
                
                // 模拟进度条 (假设40秒)
                simulateProgress();

                try {
                    const formData = new FormData();
                    formData.append('file', currentFile);
                    
                    // Webhook URL 
                    const webhookUrl = 'https://hook.us2.make.com/fq3o85f4iyclpx2yaofca863e4xto6de';
                    
                    const response = await fetch(webhookUrl, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`HTTP error! status: ${response.status}, 详情: ${errorText}`);
                    }

                    const text = await response.text();
                    let result;
                    try {
                        result = JSON.parse(text);
                    } catch (e) {
                        throw new Error('解析 JSON 失败，后端返回内容: ' + text);
                    }
                    
                    // 强制进度条走满
                    clearInterval(progressInterval);
                    updateProgress(100);

                    if (result.status === 'success' && Array.isArray(result.data)) {
                        // 短暂延迟让用户看到 100% 后再切换页面
                        setTimeout(() => {
                            renderResults(result.data);
                            loadingSection.classList.add('hidden');
                            resultSection.classList.remove('hidden');
                        }, 500);
                    } else {
                        throw new Error('返回的数据格式不正确或后端生成失败');
                    }

                } catch (error) {
                    console.error('上传失败:', error);
                    clearInterval(progressInterval);
                    alert('生成失败，请检查网络或稍后重试。' + error.message);
                    
                    // 恢复上传页面
                    loadingSection.classList.add('hidden');
                    uploadSection.classList.remove('hidden');
                    updateProgress(0);
                }
            });

            // --- 进度条模拟 ---
            function simulateProgress() {
                let percent = 0;
                // 40秒 = 40000ms, 更新 100 次，每次 400ms
                progressInterval = setInterval(() => {
                    percent += 1;
                    // 最多模拟到 98%，留着最后 2% 在真实请求完成时填满
                    if (percent > 98) {
                        percent = 98;
                    }
                    updateProgress(percent);
                }, 400);
            }

            function updateProgress(percent) {
                progressBar.style.width = `${percent}%`;
                progressText.textContent = `${percent}%`;
            }

            // --- 结果渲染与下载处理 ---
            
            function renderResults(imageUrls) {
                gridContainer.innerHTML = ''; // 清空之前的
                
                imageUrls.forEach((url, index) => {
                    const card = document.createElement('div');
                    card.className = 'image-card relative bg-white rounded-xl overflow-hidden shadow-sm border border-gray-200 group transition-transform duration-300 hover:-translate-y-1 hover:shadow-lg';
                    
                    // 卡片内容: 图片和遮罩层下载按钮
                    card.innerHTML = `
                        <div class="aspect-w-4 aspect-h-3 w-full bg-gray-100">
                            <img src="${url}" alt="优化方案 ${index + 1}" class="w-full h-64 object-cover" loading="lazy">
                        </div>
                        <div class="p-4 flex justify-between items-center border-t border-gray-100 bg-white">
                            <h3 class="font-medium text-gray-800">优化方案 ${index + 1}</h3>
                        </div>
                        
                        <!-- 悬浮遮罩与下载按钮 (PC端悬浮可见, 移动端也可直接点击下方) -->
                        <div class="download-overlay absolute inset-0 bg-black/40 opacity-0 transition-opacity duration-300 flex items-center justify-center pointer-events-none group-hover:pointer-events-auto">
                            <button onclick="downloadImage('${url}', 'plan-${index + 1}.jpg')" class="bg-white text-gray-900 hover:bg-blue-50 px-6 py-2.5 rounded-full font-medium shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 flex items-center space-x-2">
                                <i class="fa-solid fa-download"></i>
                                <span>下载大图</span>
                            </button>
                        </div>
                    `;
                    gridContainer.appendChild(card);
                });
            }

            // 重新上传
            resetBtn.addEventListener('click', () => {
                resultSection.classList.add('hidden');
                resetUploadArea();
                uploadSection.classList.remove('hidden');
                updateProgress(0);
            });

            // 全局挂载下载函数
            window.downloadImage = async function(url, filename) {
                try {
                    // 使用 fetch 获取 blob, 避免跨域直接 a.download 失效
                    const response = await fetch(url);
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename || 'optimized-plan.jpg';
                    document.body.appendChild(a);
                    a.click();
                    
                    // 清理
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                } catch (error) {
                    console.error('下载失败，将新标签页打开', error);
                    // 备用方案：在新标签页打开
                    window.open(url, '_blank');
                }
            };
        });
    </script>
</body>
</html>
